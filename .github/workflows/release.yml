name: Release

on:
  workflow_dispatch:
    inputs:
      enable_scoop:
        description: "Publish Scoop manifest bump"
        type: boolean
        default: true
      enable_winget:
        description: "Submit winget update"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/_release.yml
    with:
      enable_scoop: ${{ inputs.enable_scoop }}
      enable_winget: ${{ inputs.enable_winget }}
      tag_strategy: suffix
    secrets: inherit
