name: Daily Build

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version_tag: ${{ steps.check.outputs.version_tag }}
      short_sha: ${{ steps.check.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release view --json targetCommitish -q '.targetCommitish' 2>/dev/null || echo "")
          HEAD=$(git rev-parse HEAD)
          SHORT=$(git rev-parse --short=7 HEAD)
          if [ "$LATEST" = "$HEAD" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "No changes since last release ($SHORT)"
          else
            TAG="v$(date -u +%Y.%m.%d)"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "version_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "short_sha=$SHORT" >> "$GITHUB_OUTPUT"
            echo "Changes detected — will build $TAG ($SHORT)"
          fi

  build-windows:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r src/requirements.txt

      - name: Generate app icon
        run: python -c "import sys; sys.path.insert(0, 'src'); from main import _generate_app_ico; _generate_app_ico()"

      - name: Embed build version
        run: |
          echo '"""Build version — written by CI."""' > src/version.py
          echo 'BUILD_COMMIT = "${{ needs.check.outputs.short_sha }}"' >> src/version.py

      - name: Build executable
        run: >
          pyinstaller --onefile --noconsole
          --name ActionsMonitor
          --icon=app.ico
          --add-data "config.template.yaml;."
          src/main.py

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/ActionsMonitor.exe

  build-linux:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk gir1.2-gtk-3.0 gir1.2-ayatanaappindicator3-0.1

      - name: Install Python dependencies
        run: |
          grep -vi winotify src/requirements.txt | pip install -r /dev/stdin
          pip install pyinstaller

      - name: Embed build version
        run: |
          echo '"""Build version — written by CI."""' > src/version.py
          echo "BUILD_COMMIT = \"${{ needs.check.outputs.short_sha }}\"" >> src/version.py

      - name: Build binary
        run: >
          pyinstaller --onefile
          --name ActionsMonitor-linux
          --add-data "config.template.yaml:."
          src/main.py

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/ActionsMonitor-linux

  release:
    needs: [check, build-windows, build-linux]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: artifacts/

      - name: Extract changelog
        id: changelog
        run: |
          # Extract the first dated section from CHANGELOG.md
          BODY=$(awk '/^### [0-9]{4}-/{if(found) exit; found=1} found' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="No changelog entry for this release."
          fi
          # Write to file to preserve formatting
          echo "$BODY" > release_notes.md

      - name: Delete existing release for today's tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check.outputs.version_tag }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check.outputs.version_tag }}"
          SHA="${{ needs.check.outputs.short_sha }}"
          gh release create "$TAG" \
            --title "Actions Monitor $TAG" \
            --notes-file release_notes.md \
            --target "${{ github.sha }}" \
            artifacts/ActionsMonitor.exe \
            artifacts/ActionsMonitor-linux
